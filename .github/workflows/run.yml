name: Run OCI ARM Capacity Script

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install

      - name: Save private key to file
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > oci_api_key.pem
          chmod 600 oci_api_key.pem

      - name: Debug secrets and variables
        run: |
          echo "OCI_REGION=${{ secrets.OCI_REGION }}"
          echo "OCI_USER_ID=${{ secrets.OCI_USER_ID }}"
          echo "OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}"
          echo "OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}"
          echo "OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}"
          echo "OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}"
          echo "OCI_SSH_PUBLIC_KEY=${{ secrets.OCI_SSH_PUBLIC_KEY }}"
          echo "OCI_OCPUS=${{ vars.OCI_OCPUS }}"
          echo "OCI_MEMORY_IN_GBS=${{ vars.OCI_MEMORY_IN_GBS }}"
          echo "OCI_SHAPE=${{ vars.OCI_SHAPE }}"
          echo "OCI_MAX_INSTANCES=${{ vars.OCI_MAX_INSTANCES }}"
          echo "OCI_AVAILABILITY_DOMAIN=${{ vars.OCI_AVAILABILITY_DOMAIN }}"
          echo "CACHE_AVAILABILITY_DOMAINS=${{ vars.CACHE_AVAILABILITY_DOMAINS }}"
          echo "OCI_BOOT_VOLUME_SIZE_IN_GBS=${{ vars.OCI_BOOT_VOLUME_SIZE_IN_GBS }}"
          echo "OCI_BOOT_VOLUME_ID=${{ vars.OCI_BOOT_VOLUME_ID }}"
          echo "TOO_MANY_REQUESTS_TIME_WAIT=${{ vars.TOO_MANY_REQUESTS_TIME_WAIT }}"

      - name: Run script
        run: php index.php
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}   # <-- correct name
          OCI_PRIVATE_KEY_FILENAME: oci_api_key.pem
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_OCPUS: ${{ vars.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ vars.OCI_MEMORY_IN_GBS }}
          OCI_SHAPE: ${{ vars.OCI_SHAPE }}
          OCI_MAX_INSTANCES: ${{ vars.OCI_MAX_INSTANCES }}
          OCI_AVAILABILITY_DOMAIN: ${{ vars.OCI_AVAILABILITY_DOMAIN }}
          CACHE_AVAILABILITY_DOMAINS: ${{ vars.CACHE_AVAILABILITY_DOMAINS }}
          OCI_BOOT_VOLUME_SIZE_IN_GBS: ${{ vars.OCI_BOOT_VOLUME_SIZE_IN_GBS }}
          OCI_BOOT_VOLUME_ID: ${{ vars.OCI_BOOT_VOLUME_ID }}
          TOO_MANY_REQUESTS_TIME_WAIT: ${{ vars.TOO_MANY_REQUESTS_TIME_WAIT }}
